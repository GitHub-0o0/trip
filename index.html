<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Suppression of third-party script/domain authorization and cross-origin failures inside sandbox environments
      (function() {
        var suppressedKeywords = [
          'script error', 
          'invalid_user_domain', 
          'flydataauthtask', 
          'amap.com', 
          'googleapis.com', 
          'gstatic.com',
          'extension',
          'chrome-extension'
        ];

        function shouldSuppress(arg) {
          if (!arg) return false;
          try {
            var str = '';
            if (typeof arg === 'string') {
              str = arg;
            } else if (arg instanceof Error) {
              str = (arg.message || '') + ' ' + (arg.stack || '') + ' ' + String(arg);
            } else if (typeof arg === 'object') {
              try {
                str = arg.message || arg.reason || JSON.stringify(arg) || '';
              } catch (inner) {
                str = String(arg);
              }
            } else {
              str = String(arg);
            }
            var lower = str.toLowerCase();
            for (var i = 0; i < suppressedKeywords.length; i++) {
              if (lower.indexOf(suppressedKeywords[i]) !== -1) {
                return true;
              }
            }
          } catch (e) {}
          return false;
        }

        // Overrides console.error and console.warn to block third-party noises
        var originalConsoleError = window.console.error;
        window.console.error = function() {
          for (var i = 0; i < arguments.length; i++) {
            if (shouldSuppress(arguments[i])) {
              return; // Suppress the whole error call if any argument is a noisy third party error
            }
          }
          if (originalConsoleError) {
            originalConsoleError.apply(window.console, arguments);
          }
        };

        var originalConsoleWarn = window.console.warn;
        window.console.warn = function() {
          for (var i = 0; i < arguments.length; i++) {
            if (shouldSuppress(arguments[i])) {
              return;
            }
          }
          if (originalConsoleWarn) {
            originalConsoleWarn.apply(window.console, arguments);
          }
        };

        var originalOnError = window.onerror;
        window.onerror = function (message, source, lineno, colno, error) {
          if (shouldSuppress(message) || shouldSuppress(source) || shouldSuppress(error)) {
            return true; // Suppress error popup/bubbles
          }
          if (originalOnError) {
            return originalOnError.apply(this, arguments);
          }
          return false;
        };

        window.addEventListener('error', function(event) {
          if (shouldSuppress(event.message) || shouldSuppress(event.filename) || shouldSuppress(event.error)) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);

        window.addEventListener('unhandledrejection', function(event) {
          if (shouldSuppress(event.reason)) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
