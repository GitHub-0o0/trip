<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Suppression of third-party script/domain authorization and cross-origin failures inside sandbox environments
      (function() {
        var suppressedKeywords = [
          'script error', 
          'invalid_user_domain', 
          'flydataauthtask', 
          'flydata',
          'amap.com', 
          'googleapis.com', 
          'gstatic.com',
          'extension',
          'chrome-extension',
          'invalid user domain',
          'auth_task',
          'authtask',
          'user_domain',
          'invalid domain',
          'domain validation'
        ];

        function shouldSuppress(arg) {
          if (!arg) return false;
          try {
            // First check plain string direct cast/extraction
            var direct = '';
            try {
              direct = String(arg) + ' ' + (arg.message || '') + ' ' + (arg.reason || '') + ' ' + (arg.stack || '');
            } catch (e) {}
            
            var lower = direct.toLowerCase();
            for (var i = 0; i < suppressedKeywords.length; i++) {
              if (lower.indexOf(suppressedKeywords[i]) !== -1) {
                return true;
              }
            }
            
            var seen = [];
            function extractStrings(val, depth) {
              if (depth > 4 || !val) return '';
              if (typeof val === 'string') return val;
              if (typeof val === 'number' || typeof val === 'boolean') return String(val);
              if (typeof val === 'object') {
                if (seen.indexOf(val) !== -1) return '';
                seen.push(val);
                var res = '';
                // Specially probe standard and non-standard fields
                if (val.message) res += ' ' + String(val.message);
                if (val.reason) res += ' ' + String(val.reason);
                if (val.stack) res += ' ' + String(val.stack);
                if (val.name) res += ' ' + String(val.name);
                if (val.errorMessage) res += ' ' + String(val.errorMessage);
                if (val.error) res += ' ' + extractStrings(val.error, depth + 1);
                if (val.target) {
                  res += ' ' + (val.target.tagName || '') + ' ' + (val.target.src || '') + ' ' + (val.target.href || '') + ' ' + (val.target.id || '');
                }
                
                // Inspect other properties safely
                for (var key in val) {
                  try {
                    if (Object.prototype.hasOwnProperty.call(val, key)) {
                      var v = val[key];
                      if (typeof v === 'string') {
                        res += ' ' + v;
                      } else if (typeof v === 'object' && v !== null && depth < 3) {
                        res += ' ' + extractStrings(v, depth + 1);
                      }
                    }
                  } catch (e) {}
                }
                return res;
              }
              return '';
            }
            var str = extractStrings(arg, 0);
            if (!str) return false;
            lower = str.toLowerCase();
            for (var i = 0; i < suppressedKeywords.length; i++) {
              if (lower.indexOf(suppressedKeywords[i]) !== -1) {
                return true;
              }
            }
          } catch (e) {}
          return false;
        }

        // Overrides console methods to block third-party noises using Object.defineProperty to lock wrappers
        function wrapConsole(methodName) {
          var original = window.console ? window.console[methodName] : null;
          var wrapper = function() {
            for (var i = 0; i < arguments.length; i++) {
              if (shouldSuppress(arguments[i])) {
                return;
              }
            }
            if (original) {
              try {
                original.apply(window.console, arguments);
              } catch (e) {}
            }
          };
          if (window.console) {
            try {
              Object.defineProperty(window.console, methodName, {
                get: function() { return wrapper; },
                set: function(newVal) {
                  original = newVal;
                },
                configurable: true,
                enumerable: true
              });
            } catch (e) {
              window.console[methodName] = wrapper;
            }
          }
        }
        wrapConsole('error');
        wrapConsole('warn');
        wrapConsole('log');
        wrapConsole('info');

        // Leverage defineProperty to intercept and auto-wrap subsequent window.onerror assignments
        var currentOnError = null;
        try {
          Object.defineProperty(window, 'onerror', {
            get: function() {
              return currentOnError;
            },
            set: function(fn) {
              if (typeof fn === 'function') {
                currentOnError = function(message, source, lineno, colno, error) {
                  if (shouldSuppress(message) || shouldSuppress(source) || shouldSuppress(error)) {
                    return true; // Block event cascading
                  }
                  return fn.apply(this, arguments);
                };
              } else {
                currentOnError = fn;
              }
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          // Fallback if property is non-configurable
          window.onerror = function (message, source, lineno, colno, error) {
            if (shouldSuppress(message) || shouldSuppress(source) || shouldSuppress(error)) {
              return true;
            }
            return false;
          };
        }

        // Leverage defineProperty to intercept and auto-wrap subsequent window.onmessage assignments
        var currentOnMessage = null;
        try {
          Object.defineProperty(window, 'onmessage', {
            get: function() {
              return currentOnMessage;
            },
            set: function(fn) {
              if (typeof fn === 'function') {
                currentOnMessage = function(event) {
                  try {
                    if (event && event.data) {
                      var dataStr = '';
                      try {
                        dataStr = typeof event.data === 'string' ? event.data : JSON.stringify(event.data);
                      } catch (jsonErr) {
                        try {
                          dataStr = String(event.data) + ' ' + (event.data.type || '') + ' ' + (event.data.error || '') + ' ' + (event.data.message || '');
                        } catch(e) {}
                      }
                      var lower = dataStr.toLowerCase();
                      if (
                        lower.indexOf('flydata') !== -1 ||
                        lower.indexOf('authtask') !== -1 ||
                        lower.indexOf('invalid_user_domain') !== -1 ||
                        lower.indexOf('invalid user domain') !== -1
                      ) {
                        try {
                          event.preventDefault();
                          event.stopPropagation();
                          event.stopImmediatePropagation();
                        } catch(e) {}
                        return true;
                      }
                    }
                  } catch(e) {}
                  return fn.apply(this, arguments);
                };
              } else {
                currentOnMessage = fn;
              }
            },
            configurable: true,
            enumerable: true
          });
        } catch(e) {}

        // Global prototype iframe src redirection hook
        try {
          var originalSrcDescriptor = Object.getOwnPropertyDescriptor(HTMLIFrameElement.prototype, 'src');
          if (originalSrcDescriptor && originalSrcDescriptor.set) {
            Object.defineProperty(HTMLIFrameElement.prototype, 'src', {
              get: function() {
                return originalSrcDescriptor.get.call(this);
              },
              set: function(val) {
                var valStr = String(val).toLowerCase();
                if (
                  valStr.indexOf('auth.html') !== -1 ||
                  valStr.indexOf('flydata') !== -1 ||
                  valStr.indexOf('invalid_user_domain') !== -1 ||
                  valStr.indexOf('invalid user domain') !== -1 ||
                  valStr.indexOf('authtask') !== -1
                ) {
                  return originalSrcDescriptor.set.call(this, 'about:blank');
                }
                return originalSrcDescriptor.set.call(this, val);
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch(e) {}

        // Intercept window.addEventListener to wrap all listeners of 'error', 'unhandledrejection' or 'message'
        var originalAddEventListener = window.addEventListener;
        window.addEventListener = function(type, listener, options) {
          if (type === 'error' || type === 'unhandledrejection' || type === 'message') {
            var wrappedListener = function(event) {
              if (type === 'message') {
                try {
                  if (event && event.data) {
                    var dataStr = '';
                    try {
                      dataStr = typeof event.data === 'string' ? event.data : JSON.stringify(event.data);
                    } catch (jsonErr) {
                      try {
                        dataStr = String(event.data) + ' ' + (event.data.type || '') + ' ' + (event.data.error || '') + ' ' + (event.data.message || '');
                      } catch(e) {}
                    }
                    var lower = dataStr.toLowerCase();
                    if (
                      lower.indexOf('flydata') !== -1 ||
                      lower.indexOf('authtask') !== -1 ||
                      lower.indexOf('invalid_user_domain') !== -1 ||
                      lower.indexOf('invalid user domain') !== -1
                    ) {
                      try {
                        event.preventDefault();
                        event.stopPropagation();
                        event.stopImmediatePropagation();
                      } catch(e) {}
                      return;
                    }
                  }
                } catch(e) {}
              } else {
                var argToCheck = type === 'error' ? (event.message || event.error) : event.reason;
                if (shouldSuppress(event) || shouldSuppress(argToCheck)) {
                  try {
                    event.preventDefault();
                    event.stopPropagation();
                    event.stopImmediatePropagation();
                  } catch(e) {}
                  return;
                }
              }
              if (listener) {
                if (listener.handleEvent) {
                  return listener.handleEvent(event);
                } else if (typeof listener === 'function') {
                  return listener.call(this, event);
                }
              }
            };
            if (listener) {
              if (!listener._wrappers) {
                listener._wrappers = {};
              }
              listener._wrappers[type] = wrappedListener;
            }
            return originalAddEventListener.call(this, type, wrappedListener, options);
          }
          return originalAddEventListener.apply(this, arguments);
        };

        var originalRemoveEventListener = window.removeEventListener;
        window.removeEventListener = function(type, listener, options) {
          if ((type === 'error' || type === 'unhandledrejection' || type === 'message') && listener && listener._wrappers && listener._wrappers[type]) {
            var wrapper = listener._wrappers[type];
            return originalRemoveEventListener.call(this, type, wrapper, options);
          }
          return originalRemoveEventListener.apply(this, arguments);
        };

        // Static self-defense listeners
        originalAddEventListener.call(window, 'error', function(event) {
          if (event && event.target && (event.target.tagName === 'SCRIPT' || event.target.tagName === 'LINK')) {
            event.preventDefault();
            event.stopPropagation();
            return;
          }
          if (shouldSuppress(event) || shouldSuppress(event.message) || shouldSuppress(event.filename) || shouldSuppress(event.error)) {
            try {
              event.preventDefault();
              event.stopPropagation();
              event.stopImmediatePropagation();
            } catch(e) {}
          }
        }, true);

        originalAddEventListener.call(window, 'unhandledrejection', function(event) {
          if (shouldSuppress(event) || shouldSuppress(event.reason)) {
            try {
              event.preventDefault();
              event.stopPropagation();
              event.stopImmediatePropagation();
            } catch(e) {}
          }
        }, true);

        // Safe interception of dialog boxes inside the sandbox iframe
        window.alert = function(msg) {
          if (shouldSuppress(msg)) return;
          try {
            console.warn("[Suppressed Alert] ", msg);
          } catch(e) {}
        };
        window.confirm = function(msg) {
          if (shouldSuppress(msg)) return true;
          try {
            console.warn("[Suppressed Confirm] ", msg);
          } catch(e) {}
          return true;
        };
        window.prompt = function(msg) {
          if (shouldSuppress(msg)) return "";
          try {
            console.warn("[Suppressed Prompt] ", msg);
          } catch(e) {}
          return "";
        };

        // Recursive shadow-DOM aware leaf node scrubber with walk-up obliteration
        function findOutermostErrorContainer(leaf) {
          var current = leaf;
          var bestContainer = leaf;
          try {
            while (current && current.parentNode) {
              var parent = current.parentNode;
              var tag = (parent.tagName || '').toLowerCase();
              
              // Stop climbing if we hit body, html, or head
              if (tag === 'body' || tag === 'html' || tag === 'head') {
                break;
              }
              
              // Stop if we hit root to avoid hiding the entire app
              if (parent.id === 'root') {
                break;
              }
              
              // Check class names, ids, or attributes for target signatures
              var className = String(current.className || '').toLowerCase();
              var idName = String(current.id || '').toLowerCase();
              
              var isMatch = (
                className.indexOf('amap') !== -1 ||
                className.indexOf('flydata') !== -1 ||
                className.indexOf('authtask') !== -1 ||
                className.indexOf('alert') !== -1 ||
                className.indexOf('modal') !== -1 ||
                className.indexOf('popup') !== -1 ||
                className.indexOf('tips') !== -1 ||
                idName.indexOf('amap') !== -1 ||
                idName.indexOf('flydata') !== -1 ||
                idName.indexOf('authtask') !== -1 ||
                idName.indexOf('alert') !== -1 ||
                idName.indexOf('modal') !== -1 ||
                idName.indexOf('popup') !== -1 ||
                idName.indexOf('tips') !== -1
              );

              if (isMatch) {
                bestContainer = current;
              } else {
                // Check computed position/layout styles
                try {
                  var style = window.getComputedStyle ? window.getComputedStyle(current) : null;
                  if (style) {
                    var position = style.position;
                    var zIndex = parseInt(style.zIndex, 10);
                    if (position === 'fixed' || position === 'absolute' || zIndex > 10) {
                      bestContainer = current;
                    }
                  }
                } catch(e) {}
              }
              
              current = parent;
            }
          } catch(e) {}
          return bestContainer;
        }

        function checkAndMuteShadowOrTree(root) {
          if (!root) return;
          try {
            // Traverse shadow root if exists
            if (root.shadowRoot) {
              checkAndMuteShadowOrTree(root.shadowRoot);
            }
          } catch(e){}

          // If standard element node
          if (root.nodeType === 1) {
            var tag = (root.tagName || '').toLowerCase();
            // Do not hide top-level layout frameworks or non-rendered elements
            if (tag !== 'html' && tag !== 'body' && tag !== 'head' && tag !== 'script' && tag !== 'style') {
              var textLower = (root.textContent || '').toLowerCase();
              if (
                textLower.indexOf('flydataauthtask') !== -1 || 
                textLower.indexOf('invalid_user_domain') !== -1 || 
                textLower.indexOf('flydata') !== -1 ||
                textLower.indexOf('invalid user domain') !== -1 ||
                textLower.indexOf('authtask') !== -1 ||
                textLower.indexOf('user_domain') !== -1
              ) {
                // Determine if it is a leaf or lowest level container we can target safely
                var hasTargetedChild = false;
                if (root.children) {
                  for (var i = 0; i < root.children.length; i++) {
                    var chTextLower = (root.children[i].textContent || '').toLowerCase();
                    if (
                      chTextLower.indexOf('flydataauthtask') !== -1 || 
                      chTextLower.indexOf('invalid_user_domain') !== -1 || 
                      chTextLower.indexOf('flydata') !== -1 ||
                      chTextLower.indexOf('invalid user domain') !== -1 ||
                      chTextLower.indexOf('authtask') !== -1 ||
                      chTextLower.indexOf('user_domain') !== -1
                    ) {
                      hasTargetedChild = true;
                      break;
                    }
                  }
                }
                
                if (!hasTargetedChild) {
                  // This is a leaf/lowest container holding the target text node.
                  // Walk up to find the clean outer containing frame of the dialog/popup.
                  var targetToHide = findOutermostErrorContainer(root);
                  try {
                    targetToHide.style.setProperty('display', 'none', 'important');
                    targetToHide.style.setProperty('visibility', 'hidden', 'important');
                    targetToHide.style.setProperty('opacity', '0', 'important');
                    targetToHide.style.setProperty('pointer-events', 'none', 'important');
                    targetToHide.style.setProperty('height', '0px', 'important');
                    targetToHide.style.setProperty('width', '0px', 'important');
                    
                    // Clear the content of other target nested divs
                    if (targetToHide.parentNode) {
                      if (targetToHide.tagName.toLowerCase() === 'div' || targetToHide.tagName.toLowerCase() === 'span') {
                        targetToHide.innerHTML = '';
                      } else {
                        targetToHide.parentNode.removeChild(targetToHide);
                      }
                    }
                  } catch (e) {}
                }
              }
            }
          }

          // Recurse child nodes
          try {
            var child = root.firstChild;
            while (child) {
              checkAndMuteShadowOrTree(child);
              child = child.nextSibling;
            }
          } catch(e){}
        }

        // MutationObserver to automatically suppress domain or key auth error popup elements
        var domObserver = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.addedNodes) {
              for (var i = 0; i < mutation.addedNodes.length; i++) {
                var node = mutation.addedNodes[i];
                if (node.nodeType === 1) { // Element node
                  checkAndMuteShadowOrTree(node);
                }
              }
            }
          });
        });
        
        // Start observing immediately in the documentElement to capture early-load scripts
        domObserver.observe(document.documentElement, { childList: true, subtree: true });

        // Safe interception of element creation (Monkey-patching) to catch dynamic dialog insertion
        try {
          var originalCreateElement = document.createElement;
          document.createElement = function(tagName) {
            var el = originalCreateElement.apply(this, arguments);
            var tag = String(tagName).toLowerCase();
            if (tag === 'iframe' || tag === 'div' || tag === 'script') {
              var originalSetAttribute = el.setAttribute;
              el.setAttribute = function(name, val) {
                var valStr = String(val).toLowerCase();
                if (name === 'src' && (valStr.indexOf('auth.html') !== -1 || valStr.indexOf('flydata') !== -1)) {
                  // Bypass/nullify src to prevent triggering authorization errors in browser sandbox
                  return;
                }
                return originalSetAttribute.apply(this, arguments);
              };
            }
            return el;
          };
        } catch(e) {}

        // Immediate background interval scavenger
        setInterval(function() {
          try {
            // Mute standard selected known selectors
            var elementsToMute = document.querySelectorAll('iframe[src*="auth.html"], iframe[src*="amap.com"], #amap-alert, .amap-alert, .amap-tips, [class*="amap-auth"], [id*="amap-auth"], [class*="flydata"], [id*="flydata"], [class*="FlyData"], [id*="FlyData"]');
            for (var i = 0; i < elementsToMute.length; i++) {
              var el = elementsToMute[i];
              try {
                el.style.setProperty('display', 'none', 'important');
                el.style.setProperty('visibility', 'hidden', 'important');
                el.style.setProperty('opacity', '0', 'important');
                el.style.setProperty('height', '0px', 'important');
                el.style.setProperty('width', '0px', 'important');
                if (el.parentNode) {
                  el.parentNode.removeChild(el);
                }
              } catch (e) {}
            }

            // Run deep check and mute logic
            checkAndMuteShadowOrTree(document.documentElement);
          } catch(e) {}
        }, 50);

        // Add a high-priority CSS style block to prevent any popups from rendering even during loading
        var styleNode = document.createElement('style');
        styleNode.textContent = ' \
          #amap-alert, .amap-alert, [class*="amap-auth"], [id*="amap-auth"], \
          iframe[src*="auth.html"], iframe[src*="amap.com"], .amap-tips, \
          [class*="flydata"], [id*="flydata"], [class*="FlyData"], [id*="FlyData"], [class*="AuthTask"], [id*="AuthTask"] { \
            display: none !important; \
            visibility: hidden !important; \
            opacity: 0 !important; \
            pointer-events: none !important; \
            width: 0px !important; \
            height: 0px !important; \
          } \
        ';
        document.documentElement.appendChild(styleNode);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
